,CUISINES=["Европейская","Средиземноморская","Азиатская","Русская","Вегетарианская"],ALLERGIES=["Глютен","Лактоза","Орехи","Яйца","Морепродукты"],DAYS=["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"],MEALS_DB={breakfasts:[{name:"Омлет с сыром и шпинатом",calories:340,protein:28,fat:20,carbs:6,time:"15",ingredients:["Яйцо — 3шт","Сыр лёгкий — 20г","Шпинат — 20г","Йогурт греческий — 50г","Зелень","Соль, перец"],recipe:"1. Разбейте яйца в миску, добавьте йогурт, соль и перец. Взбейте вилкой 30 секунд. 2. Натрите сыр, нарежьте шпинат и зелень. Добавьте в смесь, перемешайте. 3. Прогрейте сковороду на среднем огне. Вылейте смесь и накройте крышкой. 4. Готовьте 7-10 минут до полной готовности — середина не должна быть жидкой."},{name:"Шакшука с хлебом",calories:360,protein:22,fat:16,carbs:30,time:"20",ingredients:["Яйца — 2шт","Помидоры — 1шт","Болгарский перец — 1шт","Лук — 20г","Сыр лёгкий — 20г","Масло ГХИ (или сливочное) — 2г","Хлеб цельнозерновой — 30г","Зелень, соль, перец"],recipe:"1. Нарежьте лук, перец и помидоры кубиками. 2. Обжарьте лук на масле ГХИ 2-3 мин, добавьте перец и готовьте 2 мин. Добавьте помидоры, соль и перец, тушите 5-7 мин до соуса. 3. Сделайте 2 углубления, разбейте яйца. Накройте крышкой, готовьте 4-5 мин — белок должен схватиться. 4. Посыпьте сыром и зеленью, готовьте 1 мин. Подавайте с хлебом."},{name:"ПП королевская ватрушка",calories:320,protein:26,fat:8,carbs:35,time:"35",ingredients:["Творог — 180г","Мука — 40г","Яйца — 2шт","Сахарозаменитель","Разрыхлитель","Ванилин"],recipe:"1. Разделите яйца на белки и желтки. 2. К желткам — сахарозаменитель и ванилин. В муку — разрыхлитель, влейте желтки, перемешайте до крошки. 3. Белки взбейте миксером в пену, добавьте сахарозаменитель и творог. Перемешайте. 4. В форму — половину крошки, творожную массу, сверху — оставшуюся крошку. 5. Выпекайте при 180°C 20-30 мин. Проверьте зубочисткой — должна выходить сухой."},{name:"Творожные пончики",calories:310,protein:24,fat:7,carbs:38,time:"35",ingredients:["Яйцо — 1шт","Творог обезжиренный — 180г","Мука овсяная — 40г","Мука рисовая — 30г","Сахарозаменитель","Разрыхлитель — 5г","Ванилин / корица"],recipe:"1. Разогрейте духовку до 180°C. 2. Взбейте яйцо, добавьте творог и сахарозаменитель, перемешайте. Добавьте оба вида муки, разрыхлитель и ванилин — тесто будет немного липким. 3. Смочите руки водой, сформируйте пончики диаметром 5-6 см с отверстием посередине. 4. Выпекайте 25-30 мин до золотистой корочки."},{name:"Шоколадный ПП кекс",calories:280,protein:18,fat:8,carbs:32,time:"10",ingredients:["Яйцо — 1шт","Греческий йогурт — 2 ст.л.","Мука овсяная — 2 ст.л.","Какао — 1 ч.л.","Разрыхлитель","Сахарозаменитель"],recipe:"1. Смешайте все ингредиенты в кружке до однородности — не должно быть комочков. 2. Готовьте в микроволновке на полной мощности 3-5 минут. Проверьте зубочисткой. 3. Дайте остыть 2-3 минуты — будет очень горячим!"},{name:"Скрэмбл на тостах",calories:370,protein:24,fat:18,carbs:28,time:"15",ingredients:["Хлеб цельнозерновой — 70г","Яйца — 2шт","Молоко — 20мл","Творожный сыр лёгкий — 30г","Масло ГХИ (или сливочное) — 2г","Зелень"],recipe:"1. Подсушите хлеб в тостере. 2. Взбейте яйца с молоком, добавьте соль. 3. На сковороде с маслом ГХИ готовьте яичную смесь, медленно помешивая — собирайте от краёв к центру. Снимите с огня, когда яйца ещё слегка влажные. 4. Намажьте тосты творожным сыром, выложите скрэмбл, посыпьте зеленью."},{name:"Протеиновые панкейки с бананом",calories:340,protein:22,fat:8,carbs:42,time:"20",ingredients:["Творог 5% — 100г","Яйцо — 1шт","Мука рисовая — 30г","Банан — 80г","Греческий йогурт — 30г"],recipe:"1. Банан разомните вилкой в пюре. Добавьте творог, яйцо и муку. Перемешайте до однородности — не должно быть крупных комочков. Тесто будет гуще, чем обычное. 2. Прогрейте сковороду на среднем огне (без масла — достаточно антипригарного покрытия). Выкладывайте тесто столовой ложкой, формируя панкейки диаметром 7-8 см. 3. Жарьте 2-3 мин с первой стороны до появления пузырьков на поверхности. Переверните и жарьте ещё 2 мин. 4. Подавайте с ложкой греческого йогурта."},{name:"Ленивый хачапури",calories:300,protein:22,fat:9,carbs:32,time:"15",ingredients:["Творог 0-5% — 150г","Яйцо — 1шт","Мука рисовая — 30г","Разрыхлитель — ⅓ ч.л.","Соль, специи","Зелень"],recipe:"1. Зелень мелко нарежьте. 2. Смешайте творог, яйцо, соль. Добавьте муку, разрыхлитель и зелень. Замесите мягкое тесто. 3. Выложите на холодную сковороду, сформируйте лепёшку толщиной 1 см. 4. Готовьте под крышкой на среднем огне по 4-5 мин с каждой стороны."},{name:"Творожная запеканка с ягодами",calories:290,protein:20,fat:6,carbs:34,time:"35",ingredients:["Греческий йогурт 2% — 240г","Яйцо — 1шт","Крахмал кукурузный — 20г","Сахарозаменитель","Ягоды по вкусу"],recipe:"1. Разогрейте духовку до 180°C. 2. Смешайте йогурт, яйцо и сахарозаменитель. Добавьте крахмал, перемешайте. Добавьте ягоды. 3. Перелейте в форму, выпекайте 25-30 мин. 4. Важно: полностью остудите перед подачей — запеканка уплотнится."},{name:"Конверты из лаваша с творогом",calories:330,protein:22,fat:10,carbs:36,time:"15",ingredients:["Лаваш — 100г","Творог 0-2% — 100г","Сыр лёгкий — 35г","Зелень","Соль, специи"],recipe:"1. Смешайте творог, тёртый сыр, зелень, соль. 2. Нарежьте лаваш полосками, выложите начинку, сверните конвертом. 3. Обжарьте на сухой сковороде швом вниз по 2-3 мин с каждой стороны."},{name:"Овсяно-банановые кексы",calories:260,protein:10,fat:5,carbs:44,time:"20",ingredients:["Банан — 60г","Яйцо — 1шт","Мука овсяная — 30г","Разрыхлитель — ⅓ ч.л.","Сахарозаменитель"],recipe:"1. Разогрейте духовку до 160°C. 2. Размните банан вилкой в пюре. Добавьте яйцо, муку, разрыхлитель и сахарозаменитель — перемешайте. 3. Разлейте по формам на ¾. Выпекайте 10-15 мин."},{name:"Вафли творожные (или сырники)",calories:285,protein:18,fat:7,carbs:34,time:"15",ingredients:["Творог мягкий 0.1% — 125г","Яйцо — 1шт","Мука рисовая — 30г","Сахарозаменитель"],recipe:"1. Смешайте творог, яйцо и сахарозаменитель вилкой. Добавьте муку, перемешайте. 2. Если есть вафельница: разогрейте, выложите тесто и готовьте 3-5 мин до румяности. Если нет вафельницы: выкладывайте тесто столовой ложкой на сковороду с антипригарным покрытием (без масла), прижмите слегка лопаткой. Жарьте по 3-4 мин с каждой стороны на среднем огне — получатся сырники. 3. Подавайте с йогуртом или ягодами."},{name:"Овсяноблин с творогом и зеленью",calories:310,protein:24,fat:10,carbs:30,time:"10",ingredients:["Хлопья овсяные — 50г","Яйцо — 1шт","Молоко — 100мл","Творог 5% — 80г","Зелень","Соль"],recipe:"1. Смешайте хлопья, яйцо и молоко. Оставьте на 5 минут — хлопья набухнут. 2. Вылейте на разогретую сковороду, жарьте 3 мин. Переверните, жарьте ещё 2 мин. 3. На блин выложите творог с зеленью, сверните пополам."},{name:"Каша из булгура с яйцом пашот",calories:350,protein:18,fat:10,carbs:44,time:"20",ingredients:["Булгур — 60г","Яйцо — 1шт","Шпинат — 50г","Масло ГХИ (или сливочное) — 3г","Соль, специи"],recipe:"1. Булгур залейте водой 1:2, посолите, варите 15 мин. 2. Яйцо пашот: вскипятите воду, добавьте 1 ч.л. уксуса. Разбейте яйцо в чашку. Создайте воронку ложкой и аккуратно опустите яйцо. Варите 3-4 мин. 3. Шпинат обжарьте на масле ГХИ 2 мин. Подавайте булгур со шпинатом и яйцом пашот."},{name:"Сырники без муки",calories:295,protein:26,fat:9,carbs:22,time:"20",ingredients:["Творог 5% — 200г","Яйцо — 1шт","Рисовая мука — 20г","Сахарозаменитель","Ванилин","Щепотка соли"],recipe:"1. Смешайте творог, яйцо, муку, сахарозаменитель, ванилин и соль. 2. Смочите руки и слепите сырники толщиной 1.5 см. 3. Обжаривайте на сковороде с антипригарным покрытием по 3-4 мин с каждой стороны на среднем огне. 4. Подавайте с нежирной сметаной или йогуртом."},{name:"Омлет с брокколи в духовке",calories:295,protein:24,fat:18,carbs:6,time:"25",ingredients:["Яйца — 4шт","Брокколи — 150г","Молоко — 50мл","Соль, специи","Зелень"],recipe:"1. Разогрейте духовку до 180°C. Форму смажьте. 2. Брокколи разберите на соцветия, бланшируйте в кипятке 3 мин. Выложите в форму. 3. Взбейте яйца с молоком и солью. Залейте брокколи. 4. Запекайте 20-25 мин до золотистой корочки. Посыпьте зеленью."},{name:"Гречневая каша с яйцом и овощами",calories:330,protein:16,fat:10,carbs:42,time:"20",ingredients:["Гречка — 70г","Яйцо — 2шт","Помидор — 1шт","Огурец — 1шт","Масло ГХИ (или сливочное) — 2г","Соль"],recipe:"1. Гречку промойте, варите 15 мин (1:2 воды). 2. Яйца сварите вкрутую 10 мин, очистите и нарежьте. 3. Помидор и огурец нарежьте. 4. Подавайте гречку с яйцами и свежими овощами, полейте маслом ГХИ."},{name:"Творожный смузи с бананом и ягодами",calories:270,protein:20,fat:3,carbs:38,time:"5",ingredients:["Творог 1% — 150г","Банан — 1шт","Ягоды замороженные — 100г","Молоко — 100мл","Сахарозаменитель"],recipe:"Если есть блендер: все ингредиенты взбейте 30-60 сек до однородности. Если нет блендера: разморозьте ягоды, разомните банан вилкой в пюре, смешайте с творогом, молоком и ягодами — получится вкусная творожная смесь с ягодами. Подавайте сразу."},{name:"Рисовая каша с молоком и фруктами",calories:320,protein:10,fat:5,carbs:58,time:"20",ingredients:["Рис круглый — 60г","Молоко 2.5% — 200мл","Яблоко — 0.5шт","Корица","Сахарозаменитель","Соль"],recipe:"1. Рис промойте, залейте молоком и 100 мл воды. Доведите до кипения, убавьте огонь. 2. Варите 15-18 мин, помешивая каждые 3-4 мин — молоко легко убегает. 3. Добавьте соль, сахарозаменитель и корицу. 4. Подавайте с тонко нарезанным яблоком."},{name:"Чиа-пудинг с кокосовым молоком",calories:280,protein:12,fat:14,carbs:24,time:"5",ingredients:["Семена чиа — 30г","Молоко кокосовое 10% — 150мл","Молоко 2.5% — 50мл","Ягоды — 50г","Мёд — 1 ч.л."],recipe:"1. Смешайте семена чиа с кокосовым и обычным молоком. Добавьте мёд, перемешайте. 2. Уберите в холодильник минимум на 4 часа (лучше на ночь) — чиа набухнут и масса станет пудингообразной. 3. Перемешайте перед подачей. Украсьте ягодами."}],soups:[{name:"Куриный суп с овощами",calories:155,protein:16,fat:3,carbs:14,time:"35",ingredients:["Куриное филе — 100г","Морковь — 1шт","Картофель — 1шт","Лук — 1шт","Зелень","Соль, перец"],recipe:"1. Курицу залейте 1.5 л холодной воды, доведите до кипения. Снимите пену, убавьте огонь, варите 20 мин. 2. Нарежьте: лук кубиками 1 см, морковь кружочками, картофель кубиками 2-3 см. 3. Достаньте курицу, разберите на кусочки, верните в бульон. Добавьте овощи, посолите. Варите 12-15 мин. 4. Посыпьте зеленью."},{name:"Борщ с говядиной",calories:175,protein:13,fat:5,carbs:18,time:"55",ingredients:["Говядина — 100г","Свёкла — 1шт","Капуста — 150г","Морковь — 1шт","Картофель — 1шт","Лук — 1шт","Томатная паста — 1 ст.л.","Зелень"],recipe:"1. Говядину нарежьте кубиками, залейте 1.5 л воды, варите 30 мин. Снимайте пену. 2. Нарежьте все овощи. Добавьте картофель и морковь. Через 5 мин — капусту. 3. Обжарьте лук 2 мин, добавьте свёклу и томатную пасту, готовьте 3 мин. Добавьте в суп. Варите 10-15 мин. Посыпьте зеленью."},{name:"Гречневый суп с курицей",calories:160,protein:14,fat:3,carbs:18,time:"35",ingredients:["Куриное филе — 100г","Гречка — 40г","Морковь — 1шт","Картофель — 1шт","Лук — 1шт","Зелень","Соль"],recipe:"1. Курицу нарежьте, залейте 1.5 л воды, варите 20 мин. 2. Добавьте нарезанные овощи, через 5 мин — промытую гречку. Посолите. Варите 15 мин. 3. Посыпьте зеленью."},{name:"Рыбная уха",calories:145,protein:17,fat:3,carbs:10,time:"30",ingredients:["Рыба нежирная — 150г","Картофель — 1шт","Морковь — 1шт","Лук — 1шт","Лавровый лист","Зелень","Соль, перец"],recipe:"1. Рыбу нарежьте кусками 5 см. Залейте 1.2 л воды с лавровым листом. Варите 12 мин. Достаньте рыбу. 2. Добавьте нарезанные овощи, посолите, варите 15 мин. Верните рыбу, прогрейте 2 мин. 3. Посыпьте зеленью и перцем."},{name:"Томатный суп с чечевицей",calories:165,protein:10,fat:3,carbs:24,time:"30",ingredients:["Чечевица красная — 60г","Помидоры — 200г","Лук — 1шт","Чеснок — 2 зубч.","Специи","Соль"],recipe:"1. Обжарьте лук и чеснок без масла 2-3 мин. Добавьте нарезанные помидоры, чечевицу и 500 мл воды. Посолите и добавьте специи. 2. Варите 20 мин до полного разваривания чечевицы. 3. Пробейте блендером до однородности."},{name:"Крем-суп из брокколи",calories:135,protein:8,fat:4,carbs:14,time:"25",ingredients:["Брокколи — 300г","Лук — 1шт","Чеснок — 2 зубч.","Молоко 2.5% — 100мл","Мускатный орех","Соль"],recipe:"1. Обжарьте лук и чеснок 2-3 мин. Добавьте брокколи, залейте водой до покрытия. Посолите. Варите 12-15 мин. 2. Влейте молоко. Пробейте блендером до однородности. 3. Доведите до кипения, добавьте мускатный орех."},{name:"Минестроне с овощами",calories:145,protein:6,fat:3,carbs:22,time:"40",ingredients:["Кабачок — 0.5шт","Морковь — 1шт","Сельдерей — 2 стебля","Помидоры — 2шт","Лук — 1шт","Чеснок — 2 зубч.","Фасоль консервированная — 80г","Специи (базилик, орегано)","Соль"],recipe:"1. Нарежьте все овощи кубиками 1-2 см. 2. Обжарьте лук и чеснок 2-3 мин без масла. Добавьте морковь и сельдерей, готовьте ещё 3 мин. 3. Добавьте помидоры и залейте 1.5 л воды. Варите 15 мин. 4. Добавьте кабачок и фасоль, посолите, добавьте базилик и орегано. Варите ещё 10 мин."},{name:"Суп из чечевицы с морковью и специями",calories:170,protein:11,fat:4,carbs:22,time:"30",ingredients:["Чечевица зелёная — 70г","Морковь — 2шт","Лук — 1шт","Тмин — 0.5 ч.л.","Куркума — 0.5 ч.л.","Лимонный сок — 1 ст.л.","Оливковое масло — 5г","Зелень","Соль"],recipe:"1. Лук обжарьте на масле 3 мин, добавьте тмин и куркуму — обжаривайте 1 мин. 2. Добавьте нарезанную морковь, промытую чечевицу и 1 л воды. Посолите. Варите 20-25 мин. 3. Половину супа пробейте блендером и верните в кастрюлю — получится кремовая текстура с кусочками. 4. Добавьте лимонный сок, посыпьте зеленью."},{name:"Тыквенный крем-суп",calories:140,protein:5,fat:4,carbs:20,time:"35",ingredients:["Тыква — 300г","Морковь — 1шт","Лук — 1шт","Имбирь — 0.5 ч.л.","Молоко 2.5% — 100мл","Оливковое масло — 5г","Соль, перец"],recipe:"1. Тыкву и морковь нарежьте крупными кусками, лук — дольками. 2. Слегка смажьте маслом, запекайте при 190°C 25 мин до мягкости. 3. Переложите в кастрюлю, добавьте 400 мл воды, имбирь и молоко. 4. Пробейте блендером до полной однородности. Посолите, поперчите, прогрейте."},{name:"Суп с фасолью и индейкой",calories:185,protein:18,fat:4,carbs:18,time:"40",ingredients:["Индейка филе — 100г","Фасоль белая консервированная — 100г","Помидоры — 2шт","Морковь — 1шт","Лук — 1шт","Чеснок — 2 зубч.","Розмарин","Соль, перец"],recipe:"1. Индейку нарежьте кубиками 2 см. Обжарьте без масла до корочки 5 мин. 2. Добавьте нарезанный лук, морковь и чеснок. Готовьте 3 мин. 3. Добавьте помидоры, фасоль, залейте 1 л воды. Добавьте розмарин. 4. Варите 20-25 мин. Посолите, поперчите."}],mains:[{name:"Паста с курицей и грибами в сливочном соусе",calories:420,protein:36,fat:12,carbs:44,time:"30",ingredients:["Куриное филе — 130г","Шампиньоны — 80г","Макароны — 80г","Масло ГХИ (или сливочное) — 2г","Сливки 20% — 15мл","Сыр лёгкий — 10г","Зелень","Соль, перец"],recipe:"1. Отварите макароны по инструкции. Сохраните полстакана воды. 2. Курицу нарежьте кубиками, посолите, обжарьте на масле ГХИ 7-8 мин. Добавьте нарезанные грибы, готовьте 5-7 мин. 3. Добавьте макароны, влейте сливки. Если густо — добавьте воду от варки. Тушите 2 мин. Посыпьте сыром и зеленью."},{name:"Киноа с тунцом и овощами",calories:380,protein:34,fat:8,carbs:38,time:"25",ingredients:["Тунец консервированный — 120г","Киноа — 60г","Помидоры — 1шт","Листовой салат","Зелень","Оливковое масло — 1 ч.л.","Соль"],recipe:"1. Киноа промойте 60 сек. Залейте водой 1:2, посолите. Варите 15 мин под крышкой. Настоять 3-5 мин. Зёрна готовы — появятся белые хвостики. 2. Тунец слейте, разберите вилкой. Овощи нарежьте. 3. Смешайте тёплую киноа, тунца и овощи. Заправьте оливковым маслом."},{name:"Кускус с форелью и овощным салатом",calories:400,protein:32,fat:10,carbs:44,time:"25",ingredients:["Кускус — 80г","Форель — 115г","Масло ГХИ (или сливочное) — 1г","Красная капуста — 40г","Огурцы — 2шт","Болгарский перец — 1шт","Лимонный сок","Специи"],recipe:"1. Кускус залейте равным объёмом кипятка, посолите, добавьте масло ГХИ (или сливочное). Накройте, настоять 10-15 мин. Взрыхлите вилкой. 2. Форель замаринуйте в лимонном соке и специях 10 мин. Запекайте при 180°C в фольге 20 мин. 3. Нарежьте капусту соломкой, перец и огурцы. Заправьте лимонным соком."},{name:"Гречка с куриным филе и шампиньонами",calories:390,protein:38,fat:8,carbs:42,time:"30",ingredients:["Гречка — 70г","Куриное филе — 120г","Шампиньоны — 90г","Масло ГХИ (или сливочное) — 3г","Зелень","Соль, перец"],recipe:"1. Гречку промойте, варите 15 мин (1:2 воды). 2. Курицу нарежьте кубиками, посолите и поперчите. Обжарьте на масле ГХИ 4-5 мин до корочки. Добавьте грибы, готовьте 7 мин до испарения воды и румяности. 3. Смешайте с гречкой. Посыпьте зеленью."},{name:"Рис с форелью и овощами",calories:385,protein:30,fat:10,carbs:42,time:"30",ingredients:["Рис — 65г","Форель — 110г","Масло ГХИ (или сливочное) — 2г","Лимонный сок","Соль, специи","Свежие овощи"],recipe:"1. Рис промойте до прозрачности воды. Обжарьте на масле ГХИ 3 мин. Залейте водой 1:3, посолите. Варите под крышкой 15-18 мин. 2. Форель посолите, полейте лимоном. Запекайте при 180°C 20 мин или обжарьте по 4-5 мин с каждой стороны. 3. Подавайте с нарезанными свежими овощами."},{name:"Чечевица с запечённой индейкой",calories:395,protein:38,fat:6,carbs:42,time:"40",ingredients:["Чечевица — 65г","Индейка филе — 115г","Оливковое масло — 5г","Свежие овощи","Зелень","Соль, перец, специи"],recipe:"1. Чечевицу промойте, варите в несолёной воде 20-25 мин. Солите только в конце. 2. Индейку посолите, поперчите и натрите специями. Запекайте при 190°C 30-35 мин. 3. Нарежьте овощи, заправьте маслом. Подавайте вместе."},{name:"Картофель с курицей и брокколи в рукаве",calories:390,protein:34,fat:5,carbs:48,time:"50",ingredients:["Куриное филе — 150г","Картофель — 220г","Брокколи — 100г","Цветная капуста — 100г","Соль, специи","Зелень"],recipe:"1. Разогрейте духовку до 190°C. Нарежьте всё, посолите, добавьте специи. 2. Сложите в рукав для запекания, завяжите. Сделайте 3-4 прокола в верхней части. 3. Запекайте 40-45 мин. Аккуратно разрежьте рукав (горячий пар!), посыпьте зеленью."},{name:"Картофель с треской",calories:365,protein:28,fat:7,carbs:46,time:"50",ingredients:["Картофель — 200г","Треска — 140г","Масло ГХИ (или сливочное) — 5г","Соль, специи"],recipe:"1. Разогрейте духовку до 190°C. Форму смажьте маслом ГХИ. 2. Картофель нарежьте крупно, треску — стейками. Посолите, добавьте специи. Выложите в форму, накройте фольгой. 3. Запекайте 40-45 мин. За 10 мин до конца снимите фольгу для румяности."},{name:"Фунчоза с курицей и овощами",calories:400,protein:34,fat:8,carbs:46,time:"25",ingredients:["Куриное филе — 200г","Фунчоза — 75г","Болгарский перец — 60г","Морковь — 40г","Соевый соус — 20г","Масло ГХИ (или сливочное) — 4г","Кунжут"],recipe:"1. Фунчозу залейте кипятком на 5 мин, промойте холодной водой. 2. Курицу нарежьте, обжарьте на масле ГХИ 5-6 мин. Добавьте морковь соломкой и перец. Тушите 5-7 мин. 3. Добавьте соевый соус и немного воды, тушите 2-3 мин. Смешайте с фунчозой, посыпьте кунжутом."},{name:"Булгур с горбушей и брокколи",calories:375,protein:30,fat:9,carbs:40,time:"30",ingredients:["Булгур — 70г","Горбуша — 130г","Брокколи — 100г","Масло ГХИ (или сливочное) — 3г","Лимонный сок","Соль, специи","Зелень"],recipe:"1. Булгур обжарьте на масле ГХИ 5 мин, залейте водой 1:2, варите 15-20 мин. Горбушу замаринуйте в лимоне и специях. Рыбу и брокколи запекайте при 190°C 20-25 мин. Подавайте с зеленью."},{name:"Куриное пюре с картофелем и овощами",calories:410,protein:34,fat:8,carbs:48,time:"40",ingredients:["Куриное филе — 145г","Картофель — 220г","Масло сливочное — 5г","Молоко 2.5% — 30мл","Овощная смесь замороженная","Соль, специи"],recipe:"1. Картофель нарежьте кубиками, отварите 20-25 мин. Добавьте масло и тёплое молоко, разомните в пюре. 2. Курицу натрите специями, запеките при 180°C 25-30 мин. 3. Овощную смесь тушите на сухой сковороде 8-10 мин. Подавайте вместе."},{name:"Паста с креветками в сливочном соусе",calories:415,protein:32,fat:11,carbs:46,time:"20",ingredients:["Креветки очищенные — 145г","Спагетти — 70г","Сливки 10% — 80мл","Масло ГХИ (или сливочное) — 5г","Соль, специи"],recipe:"1. Спагетти отварите в подсоленной воде по инструкции минус 1 мин. 2. Обсушите креветки. Обжарьте на масле ГХИ по 1.5-2 мин с каждой стороны — станут розовыми. Не передержите! 3. Влейте сливки, готовьте 2-3 мин. Добавьте спагетти, перемешайте, прогрейте 1 мин."},{name:"Гречка с куриной печенью",calories:365,protein:30,fat:10,carbs:36,time:"30",ingredients:["Гречка — 65г","Печень куриная — 130г","Морковь — 1шт","Лук — 1шт","Масло ГХИ (или сливочное) — 3г","Зелень","Соль, перец"],recipe:"1. Гречку варите 15 мин. 2. Лук и морковь обжарьте на масле ГХИ 5-7 мин. 3. Печень промойте, срежьте плёнки, нарежьте. Добавьте к луку, обжаривайте 3-4 мин с каждой стороны. Солите в конце. 4. Смешайте с гречкой, посыпьте зеленью."},{name:"Салат с курицей и фасолью",calories:360,protein:34,fat:12,carbs:24,time:"20",ingredients:["Куриное филе — 140г","Фасоль красная консервированная — 80г","Оливковое масло — 10г","Горчица зернистая — 5г","Листовой салат","Помидоры","Огурцы","Болгарский перец"],recipe:"1. Курицу нарежьте, обжарьте 8-10 мин или отварите. 2. Фасоль промойте. Овощи нарежьте, салат разберите. 3. Заправка: масло + горчица + соль. Смешайте всё, полейте заправкой."},{name:"Говядина с тушёными овощами",calories:420,protein:36,fat:15,carbs:22,time:"35",ingredients:["Говядина — 150г","Кабачок — 1шт","Болгарский перец — 1шт","Помидоры — 2шт","Чеснок — 2 зубч.","Специи","Соль"],recipe:"1. Говядину нарежьте кубиками 3 см. Обжарьте на сухой сковороде 5 мин до корочки. 2. Добавьте нарезанный чеснок, кабачок и перец. Готовьте 5 мин. 3. Добавьте помидоры, посолите, добавьте специи. Тушите 20 мин под крышкой на тихом огне."},{name:"Куриная грудка с рисом и овощным салатом",calories:400,protein:38,fat:5,carbs:48,time:"30",ingredients:["Куриная грудка — 160г","Рис — 70г","Огурец — 1шт","Помидор — 1шт","Зелень","Лимонный сок","Соль, специи"],recipe:"1. Рис варите 18 мин. 2. Грудку посолите, добавьте специи. Варите 25 мин или запеките при 180°C 25 мин. 3. Нарежьте овощи, полейте лимонным соком, посолите. Подавайте курицу с рисом и свежим салатом."},{name:"Запечённая рыба с картофелем",calories:380,protein:28,fat:8,carbs:46,time:"45",ingredients:["Минтай / хек — 150г","Картофель — 200г","Лук — 1шт","Лимон — 0.5шт","Специи для рыбы","Соль"],recipe:"1. Картофель нарежьте кружочками 5 мм, лук — кольцами. Выложите в форму, посолите. 2. Рыбу посолите, добавьте специи и лимонный сок. Выложите поверх картофеля. 3. Накройте фольгой. Запекайте при 190°C 35 мин. Снимите фольгу и запекайте ещё 10 мин."},{name:"Индейка с булгуром и шпинатом",calories:395,protein:38,fat:8,carbs:38,time:"30",ingredients:["Индейка филе — 160г","Булгур — 75г","Шпинат — 100г","Чеснок — 2 зубч.","Масло ГХИ (или сливочное) — 3г","Соль, специи"],recipe:"1. Булгур промойте, обжарьте на масле ГХИ 3 мин. Залейте водой 1:2, варите 15 мин. 2. Индейку нарежьте, обжарьте 8-10 мин до готовности. Добавьте чеснок и шпинат, тушите 3 мин до увядания. 3. Смешайте с булгуром."},{name:"Чаша Будды с киноа и нутом",calories:420,protein:20,fat:14,carbs:50,time:"30",ingredients:["Киноа — 60г","Нут консервированный — 100г","Авокадо — 0.5шт","Помидоры черри — 100г","Огурец — 1шт","Листовой салат","Лимонный сок — 2 ст.л.","Оливковое масло — 10г","Соль"],recipe:"1. Киноа промойте, варите 15 мин (1:2 воды). 2. Нут промойте. Авокадо нарежьте кубиками, полейте лимоном. Помидоры разрежьте пополам. Огурец нарежьте. 3. В тарелке разложите: киноа, нут, авокадо, помидоры, огурец, салат. 4. Заправьте оливковым маслом и лимонным соком."},{name:"Тефтели из индейки с гречкой",calories:400,protein:36,fat:8,carbs:44,time:"40",ingredients:["Фарш из индейки — 180г","Гречка — 70г","Лук — 1шт","Яйцо — 1шт","Томатная паста — 1 ст.л.","Морковь — 1шт","Соль, специи"],recipe:"1. Гречку варите 15 мин. 2. Лук мелко нарежьте, добавьте в фарш вместе с яйцом, солью и специями. Перемешайте. 3. Мокрыми руками сформируйте тефтели. 4. В сковороде разведите томатную пасту в 200 мл воды, добавьте натёртую морковь. Выложите тефтели, тушите 25 мин под крышкой."},{name:"Запечённая куриная грудка с овощами и картофелем",calories:380,protein:34,fat:5,carbs:46,time:"45",ingredients:["Куриная грудка — 150г","Картофель — 180г","Цукини — 1шт","Болгарский перец — 1шт","Розмарин","Соль, специи"],recipe:"1. Разогрейте духовку до 190°C. 2. Картофель нарежьте дольками, цукини кружочками, перец полосками. 3. Смешайте овощи и курицу со специями и розмарином. Разложите на противне. 4. Запекайте 40-45 мин, перевернув один раз в середине готовки."},{name:"Рыбные котлеты с салатом",calories:350,protein:32,fat:12,carbs:22,time:"35",ingredients:["Минтай — 200г","Лук — 1шт","Яйцо — 1шт","Рисовая мука — 20г","Огурец — 1шт","Помидор — 1шт","Соль, специи"],recipe:"1. Минтай измельчите в блендере или мелко нарежьте. Добавьте мелко нарезанный лук, яйцо, муку, соль. Перемешайте. 2. Мокрыми руками сформируйте котлеты. Запекайте при 180°C 25 мин. 3. Нарежьте свежие овощи, подавайте рядом."},{name:"Лосось на пару с гарниром из киноа",calories:430,protein:38,fat:16,carbs:30,time:"25",ingredients:["Лосось — 150г","Киноа — 50г","Шпинат — 100г","Лимон — 0.5шт","Соль, специи"],recipe:"1. Киноа промойте, варите 15 мин. 2. Лосось посолите, добавьте специи и лимонный сок. Готовьте на пару 12-15 мин или запекайте при 180°C 15 мин. 3. Шпинат обжарьте без масла 2-3 мин. Подавайте лосось с киноа и шпинатом."},{name:"Куриные стрипсы в духовке с гречкой",calories:390,protein:40,fat:6,carbs:42,time:"35",ingredients:["Куриное филе — 180г","Гречка — 70г","Паприка — 1 ч.л.","Чесночный порошок — 0.5 ч.л.","Соль, перец"],recipe:"1. Гречку варите 15 мин. 2. Курицу нарежьте полосками 1.5 см. Смешайте паприку, чесночный порошок, соль, перец. Обваляйте курицу в специях. 3. Выложите на решётку или противень. Запекайте при 200°C 20-25 мин до хрустящей корочки. 4. Подавайте с гречкой."},{name:"Рис с говядиной и овощами по-азиатски",calories:415,protein:34,fat:10,carbs:44,time:"30",ingredients:["Говядина — 150г","Рис — 70г","Брокколи — 100г","Морковь — 1шт","Соевый соус — 20г","Чеснок — 2 зубч.","Имбирь — 0.5 ч.л.","Кунжутное масло — 5г (или оливковое)"],recipe:"1. Рис варите 18 мин. 2. Говядину нарежьте тонкими полосками. Брокколи разберите на соцветия, морковь нарежьте соломкой. 3. Сильно разогрейте сковороду. Обжарьте говядину 2-3 мин. Добавьте овощи, чеснок и имбирь, готовьте 5 мин. 4. Влейте соевый соус и кунжутное масло (или оливковое), перемешайте. Подавайте с рисом."},{name:"Греческий салат с курицей",calories:350,protein:34,fat:14,carbs:18,time:"20",ingredients:["Куриное филе — 150г","Помидоры — 2шт","Огурец — 1шт","Маслины — 30г","Сыр фета лёгкий — 40г","Лук красный — 0.5шт","Оливковое масло — 10г","Орегано","Соль"],recipe:"1. Курицу нарежьте, обжарьте 8-10 мин или отварите. 2. Нарежьте помидоры, огурец и лук. Смешайте с маслинами и курицей. 3. Заправьте оливковым маслом с орегано. Сверху выложите фету кубиками."},{name:"Нут с курицей и шпинатом",calories:400,protein:36,fat:8,carbs:42,time:"30",ingredients:["Куриное филе — 150г","Нут консервированный — 150г","Шпинат — 100г","Чеснок — 3 зубч.","Томаты консервированные — 150г","Куркума, паприка","Соль"],recipe:"1. Курицу нарежьте кубиками, обжарьте до корочки. Добавьте чеснок, готовьте 1 мин. 2. Влейте томаты, добавьте специи. Тушите 10 мин. 3. Добавьте нут и шпинат. Готовьте 5 мин до увядания шпината."},{name:"Запечённая скумбрия с картофелем",calories:410,protein:28,fat:20,carbs:30,time:"40",ingredients:["Скумбрия — 150г","Картофель — 180г","Лук — 1шт","Лимон — 0.5шт","Укроп","Соль, специи"],recipe:"1. Картофель нарежьте кружочками, лук — кольцами. Выложите в форму слоями. 2. Скумбрию посолите, добавьте специи и лимонный сок. Выложите на картофель. 3. Накройте фольгой, запекайте при 190°C 35 мин. Снимите фольгу на 5 мин. Посыпьте укропом."},{name:"Кебаб из индейки с овощами",calories:375,protein:40,fat:8,carbs:28,time:"35",ingredients:["Фарш индейки — 200г","Болгарский перец — 2шт","Цукини — 1шт","Лук — 0.5шт","Специи (зира, паприка)","Соль","Зелень"],recipe:"1. В фарш добавьте специи, соль и мелко нарезанный лук. Вымешайте. 2. Сформируйте продолговатые котлеты. Перец и цукини нарежьте крупными кусками. 3. Выложите на противень. Запекайте при 190°C 25-30 мин, один раз переверните. Подавайте с зеленью."},{name:"Плов из курицы с булгуром",calories:420,protein:36,fat:8,carbs:50,time:"40",ingredients:["Куриное филе — 160г","Булгур — 80г","Морковь — 1шт","Лук — 1шт","Чеснок — 3 зубч.","Масло ГХИ (или сливочное) — 5г","Зира, куркума","Соль"],recipe:"1. Лук нарежьте кубиками, морковь — соломкой, курицу — кусками 3 см. 2. Обжарьте курицу на масле ГХИ до корочки. Добавьте лук и морковь, готовьте 5 мин. 3. Добавьте промытый булгур и целые зубчики чеснока. 4. Залейте водой вдвое больше объёма булгура, посолите и добавьте специи. Накройте крышкой, варите на тихом огне 20 мин."}],dinners:[{name:"Кускус с форелью и салатом",calories:400,protein:32,fat:10,carbs:44,time:"25",ingredients:["Кускус — 80г","Форель — 115г","Красная капуста — 40г","Огурцы — 2шт","Болгарский перец — 1шт","Лимонный сок","Специи","Масло ГХИ (или сливочное) — 1г"],recipe:"1. Кускус залейте равным объёмом кипятка с солью и маслом ГХИ. Накройте на 15 мин, взрыхлите вилкой. 2. Форель замаринуйте в лимоне и специях, запекайте в фольге при 180°C 20 мин. 3. Нарежьте овощи тонко, заправьте лимонным соком."},{name:"Гречка с куриным филе и грибами",calories:390,protein:38,fat:8,carbs:42,time:"30",ingredients:["Гречка — 70г","Куриное филе — 120г","Шампиньоны — 90г","Масло ГХИ (или сливочное) — 3г","Зелень","Соль, перец"],recipe:"1. Гречку варите 15 мин. 2. Курицу нарежьте, посолите, обжарьте до корочки. Добавьте грибы, готовьте 7 мин. 3. Смешайте с гречкой, посыпьте зеленью."},{name:"Чечевица с индейкой и овощным салатом",calories:395,protein:38,fat:6,carbs:42,time:"40",ingredients:["Чечевица — 65г","Индейка филе — 115г","Оливковое масло — 5г","Свежие овощи","Зелень","Соль, специи"],recipe:"1. Чечевицу варите в несолёной воде 20-25 мин, солите в конце. 2. Индейку посолите и запекайте при 190°C 30 мин. 3. Овощи нарежьте, заправьте маслом. Подавайте вместе."},{name:"Запечённый лосось с брокколи",calories:420,protein:38,fat:20,carbs:8,time:"25",ingredients:["Лосось — 160г","Брокколи — 200г","Лимон — 0.5шт","Оливковое масло — 1 ч.л.","Чеснок — 1 зубч.","Соль, специи"],recipe:"1. Лосось и брокколи выложите на противень. Сбрызните маслом и лимоном, добавьте специи. 2. Запекайте при 190°C 20-22 мин. Лосось готов — легко распадается вилкой."},{name:"Куриная грудка с овощами на гриле",calories:340,protein:40,fat:8,carbs:16,time:"20",ingredients:["Куриная грудка — 180г","Цукини — 1шт","Болгарский перец — 1шт","Оливковое масло — 5г","Специи","Соль"],recipe:"1. Грудку отбейте до толщины 1.5 см. Смешайте масло и специи, смажьте курицу и овощи. 2. Гриль-сковороду сильно разогрейте. Курицу готовьте 6-7 мин с каждой стороны. 3. Овощи — по 3-4 мин с каждой стороны."},{name:"Омлет с индейкой и шпинатом",calories:370,protein:35,fat:20,carbs:8,time:"15",ingredients:["Яйца — 3шт","Индейка — 100г","Шпинат — 80г","Сыр лёгкий — 20г","Соль, перец"],recipe:"1. Индейку нарежьте, обжарьте на сухой сковороде 5 мин. 2. Добавьте шпинат, тушите 2 мин до увядания. 3. Яйца взбейте с солью. Залейте начинку. Посыпьте сыром, накройте крышкой. Готовьте 7-8 мин."},{name:"Творожная запеканка с яйцами",calories:350,protein:28,fat:8,carbs:36,time:"45",ingredients:["Творог 5% — 300г","Яйца — 2шт","Манка — 3 ст.л.","Сахарозаменитель","Ванилин"],recipe:"1. Смешайте творог, яйца, манку, сахарозаменитель и ванилин. Перемешайте. 2. Выложите в форму. 3. Запекайте при 180°C 35-40 мин. Дайте остыть 10 мин перед подачей."},{name:"Рыба с печёными овощами",calories:350,protein:30,fat:8,carbs:34,time:"40",ingredients:["Хек / минтай — 160г","Картофель — 150г","Морковь — 1шт","Лук — 1шт","Лимонный сок","Специи","Соль"],recipe:"1. Картофель нарежьте кружочками, морковь — кружочками, лук — кольцами. Выложите в форму. 2. Рыбу посолите, добавьте специи и лимон. Выложите на овощи. Накройте фольгой. 3. Запекайте при 190°C 35 мин. Снимите фольгу на 10 мин для румяности."},{name:"Индейка с тушёными овощами",calories:360,protein:38,fat:6,carbs:28,time:"35",ingredients:["Индейка — 170г","Кабачок — 1шт","Морковь — 1шт","Лук — 1шт","Томаты консервированные — 200г","Чеснок — 2 зубч.","Специи","Соль"],recipe:"1. Индейку нарежьте кубиками, обжарьте без масла 5-7 мин. 2. Добавьте нарезанный лук, морковь и чеснок. Готовьте 5 мин. 3. Добавьте кабачок и томаты. Посолите, добавьте специи. Тушите 20 мин."},{name:"Гречка с куриной печенью и луком",calories:365,protein:30,fat:10,carbs:36,time:"30",ingredients:["Гречка — 65г","Печень куриная — 130г","Лук — 1шт","Морковь — 1шт","Масло ГХИ (или сливочное) — 3г","Зелень","Соль, перец"],recipe:"1. Гречку варите 15 мин. 2. Лук нарежьте полукольцами, морковь натрите. Обжарьте на масле 5 мин. 3. Печень промойте, срежьте плёнки, нарежьте. Добавьте к луку, обжарьте 4-5 мин. Солите в конце. 4. Смешайте с гречкой, посыпьте зеленью."},{name:"Белая рыба с зелёным горошком",calories:320,protein:30,fat:6,carbs:30,time:"25",ingredients:["Треска / пикша — 170г","Горошек замороженный — 100г","Лимон — 0.5шт","Укроп","Масло ГХИ (или сливочное) — 3г","Соль, специи"],recipe:"1. Рыбу посолите, добавьте специи. На сковороде с маслом ГХИ обжарьте по 4-5 мин с каждой стороны. 2. Горошек залейте кипятком на 3 мин, слейте. 3. Подавайте рыбу с горошком, украсьте укропом и лимоном."},{name:"Запечённые куриные котлеты с пюре",calories:380,protein:36,fat:8,carbs:38,time:"45",ingredients:["Куриный фарш — 180г","Лук — 1шт","Яйцо — 1шт","Картофель — 200г","Молоко — 30мл","Масло ГХИ (или сливочное) — 5г","Соль, специи"],recipe:"1. Смешайте фарш с нарезанным луком, яйцом, солью и специями. Сформируйте котлеты. 2. Выложите на смазанный противень. Запекайте при 190°C 25-30 мин. 3. Картофель отварите, разомните с маслом и тёплым молоком в пюре. Подавайте вместе."},{name:"Тушёная говядина с гречкой",calories:420,protein:36,fat:14,carbs:32,time:"50",ingredients:["Говядина — 150г","Гречка — 65г","Лук — 1шт","Морковь — 1шт","Томатная паста — 1 ст.л.","Чеснок — 2 зубч.","Соль, специи"],recipe:"1. Говядину нарежьте кубиками 3 см. Обжарьте на сухой сковороде 5 мин до корочки. 2. Добавьте лук, морковь и чеснок. Готовьте 5 мин. 3. Добавьте томатную пасту и 200 мл воды. Тушите под крышкой 35-40 мин до мягкости. 4. Гречку варите 15 мин. Подавайте вместе."},{name:"Куриная грудка с рисом и свежим салатом",calories:370,protein:38,fat:5,carbs:40,time:"30",ingredients:["Куриная грудка — 160г","Рис — 65г","Огурец — 1шт","Помидор — 1шт","Листовой салат","Лимонный сок","Соль, специи"],recipe:"1. Рис промойте, варите 18 мин (1:2 воды). 2. Грудку посолите, натрите специями. Запеките при 180°C 25 мин или отварите 25 мин. 3. Нарежьте овощи, листья салата разберите. Заправьте лимонным соком и солью. 4. Подавайте курицу с рисом и свежим салатом рядом."},{name:"Минтай с тушёными кабачками",calories:290,protein:28,fat:6,carbs:26,time:"30",ingredients:["Минтай — 180г","Кабачок — 1шт","Лук — 1шт","Морковь — 1шт","Томатная паста — 1 ст.л.","Масло ГХИ (или сливочное) — 3г","Соль, специи","Зелень"],recipe:"1. Кабачок нарежьте полукружиями, лук кубиками, морковь натрите. 2. Обжарьте лук и морковь на масле ГХИ 4 мин. Добавьте кабачок и томатную пасту разведённую в 100 мл воды. Тушите 10 мин. 3. Минтай посолите и добавьте специи. Выложите поверх овощей, накройте крышкой. Тушите ещё 15 мин. Посыпьте зеленью."},{name:"Запечённая индейка с гречкой и зеленью",calories:390,protein:40,fat:7,carbs:38,time:"40",ingredients:["Индейка — 170г","Гречка — 70г","Чеснок — 3 зубч.","Оливковое масло — 5г","Розмарин","Лимонный сок","Соль, специи"],recipe:"1. Индейку натрите смесью оливкового масла, чеснока, розмарина, лимонного сока, соли и специй. Маринуйте 15 мин. 2. Выложите в форму, запекайте при 185°C 30-35 мин. Проверьте готовность: сок при прокалывании должен быть прозрачным. 3. Гречку варите 15 мин. Подавайте с зеленью."},{name:"Рыбные тефтели с рисом",calories:360,protein:30,fat:8,carbs:40,time:"40",ingredients:["Хек или минтай (фарш) — 180г","Рис — 65г","Лук — 0.5шт","Яйцо — 1шт","Рисовая мука — 15г","Томатная паста — 1 ст.л.","Соль, специи"],recipe:"1. Рыбу измельчите в блендере или нарубите. Добавьте мелко нарезанный лук, яйцо, муку, соль и специи. 2. Мокрыми руками сформируйте небольшие шарики. 3. В сковороде разведите томатную пасту в 200 мл воды. Выложите тефтели. Тушите под крышкой 20-25 мин. 4. Рис отварите отдельно, подавайте вместе."},{name:"Творог с зеленью и огурцами как ужин",calories:230,protein:24,fat:4,carbs:22,time:"5",ingredients:["Творог 2% — 200г","Огурец — 1шт","Зелень — пучок","Чеснок — 1 зубч.","Соль, специи"],recipe:"Огурец нарежьте мелкими кубиками. Зелень нарубите. Чеснок мелко нарежьте или натрите. Смешайте всё с творогом. Посолите и добавьте специи. Лёгкий белковый ужин за 5 минут."}],snacks:[{name:"Творог с ягодами",calories:150,protein:16,fat:1,carbs:18,time:"2",ingredients:["Творог обезжиренный — 150г","Ягоды — 80г","Сахарозаменитель по вкусу"],recipe:"Творог выложите в миску. Добавьте ягоды и сахарозаменитель. Если творог густой — добавьте ложку кефира для мягкости. Перемешайте."},{name:"Греческий йогурт с орехами и мёдом",calories:170,protein:12,fat:8,carbs:14,time:"2",ingredients:["Греческий йогурт 2% — 150г","Грецкие орехи — 15г","Мёд — 1 ч.л."],recipe:"Йогурт выложите в миску. Орехи слегка измельчите руками. Добавьте орехи и мёд. Перемешайте. Подавайте сразу — орехи размякнут."},{name:"Протеиновый коктейль с бананом",calories:220,protein:24,fat:3,carbs:22,time:"5",ingredients:["Протеин — 30г (можно заменить на 100г творога)","Молоко — 200мл","Банан — 0.5шт"],recipe:"С блендером: влейте молоко, добавьте протеин и банан, взбейте 30 сек. С шейкером: налейте молоко, добавьте протеин, закройте и встряхните 30 сек, банан съешьте отдельно. Без приспособлений: смешайте 100г творога с молоком и размятым бананом — полноценная замена протеиновому коктейлю."},{name:"Варёные яйца",calories:155,protein:12,fat:10,carbs:1,time:"12",ingredients:["Яйца — 2шт"],recipe:"Яйца достаньте заранее из холодильника. Вскипятите воду, аккуратно опустите яйца. Варите 10-12 мин для твёрдого желтка. Переложите в холодную воду на 5 мин — легче чистить."},{name:"Протеиновый батончик",calories:200,protein:20,fat:6,carbs:18,time:"1",ingredients:["Протеиновый батончик — 1шт"],recipe:"Выбирайте батончики с белком 15-20г и сахаром не более 5г. Подходит для быстрого перекуса. Хорошие варианты: R.A.W., Fit Kit, Bombbar без сахара."},{name:"Кефир с отрубями",calories:140,protein:6,fat:3,carbs:18,time:"2",ingredients:["Кефир 1% — 250мл","Отруби — 2 ст.л."],recipe:"Налейте кефир, добавьте отруби. Подождите 5 мин — отруби набухнут и дадут ощущение сытости. Пейте сразу."},{name:"Яблоко с миндалём",calories:175,protein:4,fat:9,carbs:20,time:"2",ingredients:["Яблоко — 1шт","Миндаль — 20г"],recipe:"Нарежьте яблоко дольками. Подавайте с миндалём. Хорошая комбинация: клетчатка + белки + полезные жиры = длительное насыщение."},{name:"Чиа-пудинг ночной",calories:190,protein:8,fat:9,carbs:18,time:"5",ingredients:["Семена чиа — 25г (продаются в отделе здорового питания)","Молоко 2.5% — 200мл","Мёд — 1 ч.л.","Ягоды — 50г"],recipe:"Смешайте чиа с молоком и мёдом в стакане или контейнере. Накройте и уберите в холодильник на 4-8 часов (лучше готовить с вечера). За ночь чиа набухнут и станут похожи на пудинг — это нормально. Перемешайте перед едой. Украсьте ягодами. Семена чиа продаются в Ашане, Перекрёстке, ВкусВилле и на Озоне."},{name:"Хлебцы с авокадо и яйцом",calories:210,protein:10,fat:12,carbs:16,time:"10",ingredients:["Хлебцы рисовые — 3шт","Авокадо — 0.5шт","Яйцо варёное — 1шт","Лимонный сок","Соль"],recipe:"Авокадо разомните вилкой с лимонным соком и солью. Намажьте на хлебцы. Яйцо нарежьте кружочками, выложите сверху."},{name:"Творожный крем с фруктами",calories:160,protein:14,fat:2,carbs:20,time:"5",ingredients:["Творог мягкий 0% — 150г","Греческий йогурт — 50г","Сахарозаменитель","Фрукты по вкусу"],recipe:"С блендером: взбейте творог с йогуртом 30 сек до кремовой консистенции. Без блендера: тщательно разотрите творог вилкой, добавьте йогурт и сахарозаменитель, перемешайте — чем дольше, тем нежнее. Добавьте сахарозаменитель. Подавайте с нарезанными фруктами."},{name:"Банан с арахисовой пастой",calories:195,protein:6,fat:8,carbs:26,time:"2",ingredients:["Банан — 1шт","Арахисовая паста без сахара — 15г (продаётся в любом супермаркете)"],recipe:"Нарежьте банан кружочками. Рядом выложите арахисовую пасту. Обмакивайте кусочки банана. Хороший вариант перекуса до тренировки — быстрые углеводы + белок. Покупайте пасту с составом: арахис, соль — без сахара и пальмового масла."},{name:"Морковные палочки с хумусом",calories:145,protein:5,fat:6,carbs:18,time:"5",ingredients:["Морковь — 2шт","Хумус — 60г (готовый из магазина или домашний из нута)"],recipe:"Морковь очистите и нарежьте палочками 8-10 см. Хумус выложите в маленькую миску. Обмакивайте морковь в хумус. Хумус продаётся готовым в любом супермаркете рядом с сырами. Если не нашли — замените на нежирную сметану со щепоткой соли."},{name:"Яичные мини-маффины",calories:180,protein:14,fat:10,carbs:6,time:"20",ingredients:["Яйца — 3шт","Болгарский перец — 0.5шт","Шпинат — 30г","Сыр лёгкий — 20г","Соль, специи"],recipe:"1. Разогрейте духовку до 180°C. Формы для маффинов смажьте. 2. Взбейте яйца с солью. Добавьте мелко нарезанный перец и шпинат. 3. Разлейте по формам, посыпьте сыром. 4. Выпекайте 15-18 мин. Хранить в холодильнике до 3 дней."},{name:"Протеиновые шарики без выпечки",calories:185,protein:14,fat:8,carbs:14,time:"15",ingredients:["Овсяные хлопья — 50г","Протеин — 20г","Арахисовая паста — 30г","Мёд — 10г","Молоко — 30мл"],recipe:"1. Смешайте все ингредиенты до однородной массы. Если слишком сухая — добавьте молоко. 2. Поставьте в холодильник на 10 мин для затвердевания. 3. Скатайте шарики диаметром 2-3 см. Храните в холодильнике до 5 дней."},{name:"Кефирный смузи с огурцом и зеленью",calories:90,protein:5,fat:2,carbs:10,time:"5",ingredients:["Кефир 1% — 200мл","Огурец — 1шт","Шпинат — 30г","Укроп","Чеснок — 0.5 зубч.","Соль"],recipe:"С блендером: все ингредиенты взбейте до однородности. Без блендера: мелко нарежьте огурец, зелень и чеснок, смешайте с кефиром и солью — получится холодный суп гаспачо-стиль с ложкой. Освежающий лёгкий перекус, особенно летом."},{name:"Рисовые хлебцы с лососем",calories:190,protein:14,fat:6,carbs:18,time:"5",ingredients:["Хлебцы рисовые — 3шт","Слабосолёный лосось — 50г","Творожный сыр лёгкий — 30г","Зелень","Лимон"],recipe:"Хлебцы намажьте творожным сыром. Выложите тонкие кусочки лосося. Украсьте зеленью и лимоном. Богатый белком и омега-3 перекус."},{name:"Творожный мусс с какао",calories:165,protein:16,fat:3,carbs:18,time:"5",ingredients:["Творог мягкий 0% — 150г","Какао — 1 ч.л.","Сахарозаменитель","Молоко — 30мл"],recipe:"Взбейте творог с какао, сахарозаменителем и молоком блендером до воздушной кремовой консистенции. Уберите в холодильник на 10 мин. Подавайте как десерт или перекус."},{name:"Сельдерей с арахисовой пастой",calories:130,protein:6,fat:8,carbs:10,time:"3",ingredients:["Сельдерей стебли — 3-4шт","Арахисовая паста без сахара — 20г"],recipe:"Стебли сельдерея нарежьте палочками 10-12 см. Наполните углубление арахисовой пастой. Хрустящий низкокалорийный перекус с белком и клетчаткой."},{name:"Омлет-ролл с творожным сыром",calories:200,protein:18,fat:12,carbs:4,time:"10",ingredients:["Яйца — 2шт","Творожный сыр лёгкий — 40г","Зелень","Болгарский перец — 0.5шт","Соль"],recipe:"1. Взбейте яйца с солью. Вылейте на сковороду, готовьте без перемешивания до схватывания. 2. Намажьте творожный сыр, добавьте нарезанный перец и зелень. 3. Сверните в ролл. Нарежьте на порции."},{name:"Ореховое молоко с финиками",calories:145,protein:3,fat:8,carbs:16,time:"2",ingredients:["Миндальное молоко — 250мл","Финики — 2шт","Корица — щепотка"],recipe:"Финики мелко нарежьте. Смешайте с молоком и корицей в блендере. Лёгкий энергетический перекус перед тренировкой."},{name:"Запечённый нут с паприкой",calories:185,protein:9,fat:5,carbs:24,time:"25",ingredients:["Нут консервированный — 150г","Паприка — 1 ч.л.","Куркума — 0.5 ч.л.","Оливковое масло — 5г","Соль"],recipe:"1. Нут промойте, обсушите бумажным полотенцем — чем суше, тем хрустящее. 2. Смешайте с маслом и специями. Разложите на противне в один слой. 3. Запекайте при 200°C 20-25 мин, встряхните в середине. Хранится до 3 дней в открытой ёмкости."},{name:"Тост с тунцом и авокадо",calories:210,protein:16,fat:10,carbs:16,time:"5",ingredients:["Хлебцы или тост — 2шт","Тунец консервированный — 60г","Авокадо — 0.3шт","Лимонный сок","Соль, перец"],recipe:"Авокадо разомните с лимоном и солью. Намажьте на хлебцы. Тунец слейте, выложите сверху. Посыпьте перцем. Быстрый белковый перекус."},{name:"Мини-фриттата с овощами",calories:170,protein:14,fat:10,carbs:6,time:"20",ingredients:["Яйца — 3шт","Шпинат — 50г","Помидоры черри — 60г","Сыр лёгкий — 20г","Соль, специи"],recipe:"1. Разогрейте духовку до 180°C. Смажьте формы для маффинов. 2. Взбейте яйца с солью. Добавьте шпинат, разрезанные помидоры и сыр. 3. Разлейте по 6 формам. Выпекайте 15-18 мин. Хранить в холодильнике 3 дня. Удобно брать с собой."}]},COMMON_FOODS=[{name:"Сникерс 50г",cal:250,p:4,f:12,c:32},{name:"Пирожок с мясом",cal:280,p:10,f:14,c:28},{name:"Банан 1шт",cal:90,p:1,f:0,c:23},{name:"Яблоко 1шт",cal:70,p:0,f:0,c:18},{name:"Кофе с молоком",cal:60,p:3,f:3,c:6},{name:"Шоколад 30г",cal:160,p:2,f:10,c:18},{name:"Хлеб 1 кусок",cal:80,p:3,f:1,c:15},{name:"Пицца 1 кусок",cal:280,p:12,f:10,c:36}],pick=function(e){var t=arguments.length>1&&void 0!==arguments[1]?arguments[1]:0;return e[Math.abs(t)%e.length]},scaleMeals=function(e,t,a,r,n){if(!e||0===e.length)return e;var i=e.reduce(function(e,t){return
